services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: itda
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpw
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/main/resources/db-init:/docker-entrypoint-initdb.d:ro

  embedding-server:
    build: ./embedding-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      API_KEY: local-dev-key

volumes:
  pgdata:
